<div class="data-riwayat-stok">

      <span class="material-symbols-sharp">search</span>
      <label>
        <input type="text" id="txt-cari-data-riwayat-stok" placeholder="Cari Data Barang">
      </label>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-page-container">
    <div class="tabel-page-card">

          <th onclick="sortTableRiwayatStok('namaBarang')">Nama Barang</th>
